name: Wargame Auto-Revert

# Trigger this action only when a pull request is closed on the main branch
on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  revert-solution:
    # Only run this if the PR was actually merged (not just closed/rejected)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    # Grant permissions for the bot to push code and leave comments
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configure Git Identity
        run: |
          git config user.name "Leno Guild Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Revert Merge Commit
        run: |
          echo "Reverting PR #${{ github.event.pull_request.number }} to reset the wargame..."
          # -m 1 specifies the mainline branch to safely revert a merge commit
          git revert -m 1 ${{ github.event.pull_request.merge_commit_sha }} --no-edit
          git push origin main
          
      - name: Congratulate the Hacker
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🔄 **Automated Wargame Maintenance:** The vulnerability has been reset on the `main` branch for the next player.\n\n🛡️ **Congratulations on beating the challenge!** Your Soulbound Passport has been updated on-chain."
            })